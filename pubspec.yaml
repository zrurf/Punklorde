  flutter_svg: ^2.2.4
  forui: ^0.20.4
  freeport: ^1.0.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  home_widget: ^0.9.0
  html: ^0.15.6
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  live_activities: ^2.4.7
  loader_overlay: ^5.0.0
  lucide_icons_flutter: ^3.1.12
  json_serializable: ^6.13.1
  mmkv: ^2.4.0
  mobile_scanner: ^7.2.0
  nanoid_plus: ^2.0.0
  network_info_plus: ^7.0.0
  path: ^1.9.1
