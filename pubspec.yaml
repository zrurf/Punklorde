  signals: ^6.3.0
  sliver_sticky_collapsable_panel: ^5.0.0
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  stylish_bottom_bar: ^1.1.1
  toastification: ^3.0.3
  ua_client_hints: ^1.4.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  wakelock_plus: ^1.5.1
  web_socket_channel: ^3.0.3
  webview_flutter: ^4.13.1
  workmanager: ^0.9.0+3
  xxh3: ^1.2.0
  zstandard: ^1.5.0

  rust_lib_punklorde:
    path: rust_builder
  
dev_dependencies:
  build_runner: ^2.13.1
  envied_generator: ^1.3.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - LICENSE
    - assets/icon/
    - assets/images/app/
    - assets/images/logo/
    - assets/images/banner/

  fonts:
    - family: AlteDIN1451
      fonts:
        - asset: assets/fonts/AlteDin1451MittelschriftGepraegt-oMea.ttf
